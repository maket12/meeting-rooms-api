openapi: 3.0.3
info:
  title: Room Booking Service
  description: Meeting room booking service API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: Rooms
  - name: Schedules
  - name: Slots
  - name: Bookings

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RoomIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Room identifier
    BookingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Booking identifier

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "something went wrong"

    Token:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT for the Authorization Bearer header

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        created_at:
          type: string
          format: date-time
          nullable: true

    Room:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    Schedule:
      type: object
      required: [roomId, daysOfWeek, startTime, endTime]
      properties:
        id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: "Days of availability (1=Mon .. 7=Sun). Each value must be in the range of 1–7."
        start_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Start time (HH:MM) within the day. Interpreted as UTC.
        end_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: End time (HH:MM) within the day. Interpreted as UTC.

    Slot:
      type: object
      required: [id, roomId, start, end]
      properties:
        id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
          description: Slot start time in UTC (ISO 8601, e.g., 2024-06-10T09:00:00Z)
        end:
          type: string
          format: date-time
          description: Slot end time in UTC (ISO 8601, e.g., 2024-06-10T09:30:00Z)

    Booking:
      type: object
      required: [id, slotId, userId, status]
      properties:
        id:
          type: string
          format: uuid
        slot_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, cancelled]
        conference_link:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          description: Current page number (starting from 1)
        page_size:
          type: integer
          description: Number of items per page
        total:
          type: integer
          description: Total number of records

    CreateScheduleRequest:
      type: object
      properties:
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: "Days of availability (1=Mon .. 7=Sun). Each value must be in the range of 1–7."
        start_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Start time (HH:MM) within the day. Interpreted as UTC.
        end_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: End time (HH:MM) within the day. Interpreted as UTC.

  responses:
    InvalidIdentifierError:
      description: Invalid identifier
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "invalid identifier format"

    UnauthorizedError:
      description: Authorization error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_header:
              summary: Missing authorization header
              value:
                error: "missing auth header"
            invalid_token:
              summary: Invalid or expired token
              value:
                error: "invalid or expired token"

    ForbiddenError:
      description: Insufficient permissions to perform the operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "insufficient permissions"

    UserNotFoundError:
      description: User with the specified role does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "user not found"

    RoomNotFoundError:
      description: Room not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "room not found"

    ScheduleNotFoundError:
      description: Schedule not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "schedule not found"

    SlotNotFoundError:
      description: Slot not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "slot not found"

    BookingNotFoundError:
      description: Booking not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "booking not found"

    UserAlreadyExistsError:
      description: A user with the given email already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "user with given email already exists"

    ScheduleAlreadyExistsError:
      description: A schedule for this room already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "schedule for this room already exists"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "internal error"

paths:
  # ──────────────────────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────────────────────

  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user and returns their profile details. Accessible without authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Malformed JSON
                  value:
                    error: "invalid json"
                incorrect_email:
                  summary: Email not provided or invalid
                  value:
                    error: "invalid input"
                incorrect_password:
                  summary: Password not provided
                  value:
                    error: "invalid input"
                incorrect_role:
                  summary: Role not provided or invalid
                  value:
                    error: "invalid input"
        '409':
          $ref: '#/components/responses/UserAlreadyExistsError'
        '500':
          $ref: '#/components/responses/InternalError'

  /login:
    post:
      tags: [Auth]
      summary: Authenticate via email and password
      description: Authenticates a user using email and password, returning a JWT token. Accessible without authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Malformed JSON
                  value:
                    error: "invalid json"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: "invalid email or password"
        '500':
          $ref: '#/components/responses/InternalError'

  /dummyLogin:
    post:
      tags: [Auth]
      summary: Get a test JWT by role
      description: >
        Returns a test JWT for the specified role (admin / user).
        For each role, a fixed user UUID is returned to ensure consistency during testing.
        The JWT contains at least `user_id` (UUID) and `role`.
        Accessible without authentication. Only accepts valid role values: `admin` or `user`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '200':
          description: Test token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Malformed JSON
                  value:
                    error: "invalid json"
                incorrect_role:
                  summary: Invalid role value
                  value:
                    error: "invalid input"
        '404':
          $ref: '#/components/responses/UserNotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Rooms
  # ──────────────────────────────────────────────────────────────

  /rooms/list:
    get:
      tags: [Rooms]
      summary: Get a list of meeting rooms (admin and user)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: List of meeting rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /rooms/create:
    post:
      tags: [Rooms]
      summary: Create a meeting room (admin only)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                capacity:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Meeting room created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Malformed JSON
                  value:
                    error: "invalid json"
                incorrect_name:
                  summary: Missing room name
                  value:
                    error: "invalid input"
                incorrect_description:
                  summary: Invalid description format
                  value:
                    error: "invalid input"
                incorrect_capacity:
                  summary: Invalid capacity value
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Schedules
  # ──────────────────────────────────────────────────────────────

  /rooms/{id}/schedule/create:
    post:
      tags: [Schedules]
      summary: Create a schedule for a meeting room (admin only). Slot duration is 30 minutes. Immutable once created.
      description: >
        Accessible only to the admin role. A schedule can only be created once per room.
        The `daysOfWeek` array must contain values from 1 to 7 (1=Mon, 7=Sun).
        Passing values outside this range returns a 400 error.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Schedule created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    $ref: '#/components/schemas/Schedule'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  summary: Malformed JSON
                  value:
                    error: "invalid json"
                incorrect_room_id:
                  summary: Invalid room identifier
                  value:
                    error: "invalid identifier format"
                incorrect_days_of_week:
                  summary: Invalid days_of_week value
                  value:
                    error: "invalid input"
                incorrect_start_time:
                  summary: Invalid start time
                  value:
                    error: "invalid input"
                incorrect_end_time:
                  summary: Invalid end time
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          $ref: "#/components/responses/RoomNotFoundError"
        '409':
          $ref: '#/components/responses/ScheduleAlreadyExistsError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Slots
  # ──────────────────────────────────────────────────────────────

  /rooms/{id}/slots/list:
    get:
      tags: [Slots]
      summary: Get available booking slots for a room by date (admin and user)
      description: >
        Returns slots that are not occupied by an active booking for the specified meeting room on a specific date.
        All dates and times must be passed and returned in UTC.
        The `date` query parameter is required; omitting it results in a 400 error.
        If the meeting room does not have a schedule, an empty list is returned.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
        - name: date
          in: query
          required: true
          description: "Date in ISO 8601 format (e.g., 2024-06-10). Required parameter."
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of available slots. Returns an empty list if the room has no schedule or no slots available on the given date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/Slot'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                incorrect_room_id:
                  summary: Invalid room identifier
                  value:
                    error: "invalid identifier format"
                incorrect_date:
                  summary: Invalid date provided
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                room_not_found:
                  summary: Room not found
                  value:
                    error: "room not found"
                schedule_not_found:
                  summary: Schedule not found
                  value:
                    error: "schedule not found"
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Bookings
  # ──────────────────────────────────────────────────────────────

  /bookings/create:
    post:
      tags: [ Bookings ]
      summary: Create a booking for a slot (user only)
      description: >
        Accessible only to the user role. Admins cannot create bookings (returns 403).
        `userId` is extracted from the JWT token, not the request body.
        If the time slot is in the past (start < now), a 409 Conflict is returned.
      security: [ { BearerAuth: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ slotId ]
              properties:
                slot_id:
                  type: string
                  format: uuid
                create_conference_link:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/InvalidIdentifierError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          $ref: "#/components/responses/SlotNotFoundError"
        '409':
          description: Slot is already occupied or in the past
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                booking_already_exists:
                  summary: Slot is already booked
                  value:
                    error: "booking for this slot already exists"
                slot_cannot_be_booked:
                  summary: Slot is in the past and cannot be booked
                  value:
                    error: "specified slot is in the past"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/list:
    get:
      tags: [Bookings]
      summary: Paginated list of all bookings (admin only)
      description: >
        Accessible only to the admin role.
        Supports pagination via `page` and `pageSize` query parameters.
        Defaults: `page=1`, `pageSize=10` (maximum 100).
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          description: Page number (starting from 1). Default is 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of records per page. Default is 10, maximum is 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: List of all bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                incorrect_page:
                  summary: Invalid page value
                  value:
                    error: "invalid input"
                incorrect_page_size:
                  summary: Invalid page size value
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/my:
    get:
      tags: [Bookings]
      summary: Get bookings for the current authenticated user (user only)
      description: >
        Accessible only to the user role.
        Returns bookings belonging to the `user_id` present in the JWT token.
        Only upcoming bookings (start >= now) are returned; past bookings are omitted.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: List of current user's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel a booking (user can only cancel their own bookings)
      description: >
        Accessible only to the user role. A user can only cancel their own booking.
        This operation is idempotent: calling it on an already cancelled booking returns 200 along with the updated state (`status: cancelled`).
        Attempting to cancel someone else's booking returns 403.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Booking cancelled successfully (or was already cancelled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/InvalidIdentifierError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          $ref: "#/components/responses/BookingNotFoundError"
        '500':
          $ref: '#/components/responses/InternalError'