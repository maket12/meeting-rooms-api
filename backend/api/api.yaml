openapi: 3.0.3
info:
  title: Room Booking Service (Test Task)
  description: Сервис бронирования переговорок
  version: "1.0.0"

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: Rooms
  - name: Schedules
  - name: Slots
  - name: Bookings

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RoomIdPath:
      name: roomId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор переговорки
    BookingIdPath:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор брони

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "something went wrong"

    Token:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT для заголовка Authorization Bearer

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        created_at:
          type: string
          format: date-time
          nullable: true

    Room:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    Schedule:
      type: object
      required: [roomId, daysOfWeek, startTime, endTime]
      properties:
        id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: "1=Пн .. 7=Вс, дни доступности. Каждое значение должно быть в диапазоне 1–7."
        start_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Время начала (HH:MM) в рамках дня. Интерпретируется как UTC.
        end_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Время окончания (HH:MM) в рамках дня. Интерпретируется как UTC.

    Slot:
      type: object
      required: [id, roomId, start, end]
      properties:
        id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
          description: Время начала слота в UTC (ISO 8601, например 2024-06-10T09:00:00Z)
        end:
          type: string
          format: date-time
          description: Время окончания слота в UTC (ISO 8601, например 2024-06-10T09:30:00Z)

    Booking:
      type: object
      required: [id, slotId, userId, status]
      properties:
        id:
          type: string
          format: uuid
        slot_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, cancelled]
        conference_link:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          description: Текущая страница (начиная с 1)
        page_size:
          type: integer
          description: Размер страницы
        total:
          type: integer
          description: Общее количество записей

    CreateScheduleRequest:
      type: object
      properties:
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: "1=Пн .. 7=Вс, дни доступности. Каждое значение должно быть в диапазоне 1–7."
        start_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Время начала (HH:MM) в рамках дня. Интерпретируется как UTC.
        end_time:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Время окончания (HH:MM) в рамках дня. Интерпретируется как UTC.

  responses:
    UnauthorizedError:
      description: Ошибка авторизации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_header:
              summary: Отсутствует заголовок
              value:
                error: "missing auth header"
            invalid_token:
              summary: Невалидный или просроченный токен
              value:
                error: "invalid or expired token"

    ForbiddenError:
      description: Недостаточно прав для совершения операции
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "insufficient permissions"

    UserNotFoundError:
      description: >
          Пользователь с данной ролью не существует.
          Фактически является ошибкой сервера, так как возникает при отсутствии seed данных.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "user not found"

    RoomNotFoundError:
      description: Комната не найдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "room not found"

    ScheduleNotFoundError:
      description: Расписание не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "schedule not found"

    UserAlreadyExistsError:
      description: Пользователь с таким email уже существует
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "user with given email already exists"

    ScheduleAlreadyExistsError:
      description: Расписание для данной комнаты уже существует
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "schedule for this room already exists"

    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "internal error"

paths:
  # ──────────────────────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────────────────────

  /register:
    post:
      tags: [Auth]
      summary: "Регистрация пользователя (ДОПОЛНИТЕЛЬНОЕ ЗАДАНИЕ — необязательно)"
      description: >
        Создаёт нового пользователя и возвращает его данные.
        Реализация этого эндпоинта является **дополнительным заданием**.
        Для авторизации в рамках обязательной части используйте `/dummyLogin`.
        Доступен без авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_email:
                  summary: Email не указан
                  value:
                    error: "invalid input"
                incorrect_password:
                  summary: Пароль не указан
                  value:
                    error: "invalid input"
                incorrect_role:
                  summary: Роль не указана или передано недопустимое значение
                  value:
                    error: "invalid input"
        '409':
          $ref: '#/components/responses/UserAlreadyExistsError'
        '500':
          $ref: '#/components/responses/InternalError'

  /login:
    post:
      tags: [Auth]
      summary: "Авторизация по email и паролю (ДОПОЛНИТЕЛЬНОЕ ЗАДАНИЕ — необязательно)"
      description: >
        Авторизует пользователя по email и паролю, возвращает JWT.
        Реализация этого эндпоинта является **дополнительным заданием**.
        Для авторизации в рамках обязательной части используйте `/dummyLogin`.
        Доступен без авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
        '401':
          description: Неверные учётные данные
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: "invalid email or password"
        '500':
          $ref: '#/components/responses/InternalError'

  /dummyLogin:
    post:
      tags: [Auth]
      summary: Получить тестовый JWT по роли (ОБЯЗАТЕЛЬНО). Доступен без авторизации.
      description: >
        Выдаёт тестовый JWT для указанной роли (admin / user).
        Для каждой роли возвращается **фиксированный UUID** пользователя:
        один и тот же UUID для всех запросов с ролью admin и один и тот же UUID для роли user.
        Это обеспечивает стабильность при тестировании сценариев, требующих проверки владельца брони.
        JWT должен содержать как минимум `user_id` (UUID) и `role`.
        Этот эндпоинт является **обязательным** и должен быть реализован в любом случае,
        независимо от реализации `/register` и `/login`.
        Принимает только допустимые значения роли: `admin` или `user`; иные значения — 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '200':
          description: Тестовый токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_role:
                  summary: Недопустимое значение роли
                  value:
                    error: "invalid input"
        '404':
          $ref: '#/components/responses/UserNotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Rooms
  # ──────────────────────────────────────────────────────────────

  /rooms/list:
    get:
      tags: [Rooms]
      summary: Список переговорок (admin и user)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Список переговорок
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /rooms/create:
    post:
      tags: [Rooms]
      summary: Создать переговорку (только admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                capacity:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Переговорка создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_name:
                  summary: Имя не указано
                  value:
                    error: "invalid input"
                incorrect_description:
                  summary: Некорректное описание
                  value:
                    error: "invalid input"
                incorrect_capacity:
                  summary: Некорректное значение вместимости
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Schedules
  # ──────────────────────────────────────────────────────────────

  /rooms/{roomId}/schedule/create:
    post:
      tags: [Schedules]
      summary: Создать расписание переговорки (только admin, только один раз). Длительность слота 30 мин. После создания расписание изменить нельзя.
      description: >
        Доступно только роли admin.
        Расписание можно создать только один раз для каждой переговорки.
        Поле `daysOfWeek` должно содержать значения от 1 до 7 (1=Пн, 7=Вс).
        При передаче значений вне этого диапазона возвращается 400.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Расписание создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    $ref: '#/components/schemas/Schedule'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_room_id:
                  summary: Некорректный идентификатор
                  value:
                    error: "invalid identifier format"
                incorrect_days_of_week:
                  summary: Некорректное значение days_of_week
                  value:
                    error: "invalid input"
                incorrect_start_time:
                  summary: Некорректные часы работы (начало)
                  value:
                    error: "invalid input"
                incorrect_end_time:
                  summary: Некорректные часы работы (конец)
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          $ref: "#/components/responses/RoomNotFoundError"
        '409':
          $ref: '#/components/responses/ScheduleAlreadyExistsError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────────────────────
  # Slots
  # ──────────────────────────────────────────────────────────────

  /rooms/{roomId}/slots/list:
    get:
      tags: [Slots]
      summary: Список доступных для бронирования слотов по переговорке и дате (admin и user). Наиболее нагруженный эндпоинт.
      description: >
        Возвращает слоты, не занятые активной бронью, для указанной переговорки на указанную дату.
        Все даты и время передаются и возвращаются в UTC.
        Параметр `date` является обязательным; при его отсутствии возвращается 400.
        Если у переговорки нет расписания — возвращается пустой список (переговорка считается всегда недоступной).
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
        - name: date
          in: query
          required: true
          description: "Дата в формате ISO 8601 (например: 2024-06-10). Обязательный параметр; при отсутствии — 400."
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Список доступных слотов (не занятых активной бронью). Пустой список, если у переговорки нет расписания или на эту дату нет слотов.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/Slot'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                incorrect_room_id:
                  summary: Некорректный идентификатор
                  value:
                    error: "invalid identifier format"
                incorrect_date:
                  summary: Некорректная дата
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Ресурс не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                room_not_found:
                  summary: Комната не найдена
                  value:
                    error: "room not found"
                schedule_not_found:
                  summary: Расписание не найдено
                  value:
                    error: "schedule not found"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/list:
    get:
      tags: [Bookings]
      summary: Список всех броней с пагинацией (только admin)
      description: >
        Доступно только роли admin.
        Поддерживает пагинацию через параметры `page` и `pageSize`.
        Оба параметра опциональны; значения по умолчанию: `page=1`, `pageSize=20`.
        Максимальное значение `pageSize` — 100.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          description: Номер страницы (начиная с 1). По умолчанию 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Количество записей на странице. По умолчанию 20, максимум 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список всех броней
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Неверный запрос (некорректные параметры пагинации)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/my:
    get:
      tags: [Bookings]
      summary: Список броней текущего пользователя (только user)
      description: >
        Доступно только роли user.
        Возвращает брони пользователя, чей `user_id` содержится в JWT-токене.
        Возвращаются только брони на будущие слоты (start >= now); брони на уже прошедшие слоты в ответ не включаются.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Список броней текущего пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/{bookingId}/cancel:
    post:
      tags: [Bookings]
      summary: Отменить бронь (только своя бронь, только user)
      description: >
        Доступно только роли user. Пользователь может отменить только свою бронь.
        Операция **идемпотентна**: повторный вызов на уже отменённой брони не является ошибкой
        и возвращает 200 с актуальным состоянием брони (status: cancelled).
        При попытке отменить чужую бронь — 403.
        При отсутствии брони с указанным ID — 404.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Бронь отменена (или уже была отменена ранее)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          description: Бронь не найдена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          $ref: '#/components/responses/InternalError'
