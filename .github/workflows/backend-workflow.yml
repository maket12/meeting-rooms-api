name: Backend Quality Control

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-and-ci"
  cancel-in-progress: false

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./...
        working-directory: backend

  tests:
    name: Run tests
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Unit Tests
        working-directory: ./backend
        run: go test -v -short -coverprofile=unit.out -covermode=atomic ./internal/...

      - name: Run Integration Tests
        working-directory: ./backend
        run: go test -v -tags=integration -coverprofile=integration.out ./internal/adapter/...

      - name: Run E2E Tests
        working-directory: ./backend/api/tests/e2e
        run: go test -v -tags=e2e

  deploy-docs:
    name: Deploy OpenAPI to Pages
    runs-on: ubuntu-latest
    needs: [ lint, tests ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/api'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
